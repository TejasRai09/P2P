services:
  - type: web
    name: z-track
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run serve
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: ZTRACK_SECRET
        generateValue: true
      # Configure DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME, OUTLOOK_USER, and OUTLOOK_PASS in the Render dashboard.

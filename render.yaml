services:
  - type: web
    name: point2point
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/bootstrap
    envVars:
      - key: NODE_ENV
        value: production
      - key: P2P_SECRET
        generateValue: true
      # Configure DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, and DB_NAME in the Render dashboard.
